services:

  logger.channel.atproto_client:
    parent: logger.channel_base
    arguments: ['atproto_client']    

  atproto_client.endpoints:
    class: Drupal\atproto_client\EndPoints

  atproto_client.atproto_client:
    class: Drupal\atproto_client\Client\AtprotoClient
    arguments:
      - '@logger.channel.atproto_client'
      - '@config.factory'
      - '@key.repository'
      - '@http_client'
      - '@tempstore.private'
      - '@atproto_client.endpoints'
